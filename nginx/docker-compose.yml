version: '3.8'

services:

  auth:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "3001:3000"

  products:
    build: ./products-service
    container_name: products-service
    ports:
      - "3002:3000"

  orders:
    build: ./orders-service
    container_name: orders-service
    ports:
      - "3003:3000"
    depends_on:
      - products

  nginx:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth
      - products
      - orders
